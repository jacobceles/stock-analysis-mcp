repos:
  - repo: local
    hooks:
      - id: ruff
        name: Ruff linter
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: Ruff formatter
        entry: uv run ruff format
        language: system
        types: [python]

      - id: mypy
        name: Mypy type check
        entry: uv run mypy .
        language: system
        pass_filenames: false

      - id: pyrefly
        name: Pyrefly type check
        entry: uv run pyrefly check .
        language: system
        pass_filenames: false

      - id: pytest
        name: Pytest unit tests
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
